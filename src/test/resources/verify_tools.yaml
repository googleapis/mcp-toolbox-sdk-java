---
kind: tool
name: get-toy-price
type: sqlite-sql
source: local-sqlite
description: "Get the price of a toy based on a description."
parameters:
  - name: description
    type: string
    description: "A description of the toy to search for."
statement: "SELECT price FROM toys WHERE lower(description) LIKE '%' || lower(?) || '%' LIMIT 1;"
